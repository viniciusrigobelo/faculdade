<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — Comic Geek Store</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/perfil.css">

  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@300;400;600;700&family=Libre+Baskerville&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="../img/logos/logo.png">
</head>

<body>

  <!-- HEADER -->
  <header>
    <a href="../index.html"><img src="../img/logos/logo.png" alt="Logo" class="header-logo"></a>

    <div class="header-pesquisa">
      <form autocomplete="off" aria-label="Pesquisar produtos">
        <input type="text" class="header-pesquisa-input" placeholder="Pesquisar em toda a loja">
        <button type="submit" aria-label="Buscar">
          <img src="../img/icons/lupinha.png" alt="Ícone de busca">
        </button>
      </form>
    </div>

    <ul>
      <li id="li-perfil">
        <a href="../pages/login.html" id="link-perfil">
          <h3 id="perfil-nome">Entre ou Cadastre-se</h3>
          <img src="../img/icons/perfil.png" class="header-icone-perfil" alt="Perfil do usuário">
        </a>
      </li>

      <li id="li-logout" style="display:none">
        <button class="btn-logout" onclick="logout()">Sair</button>
      </li>

      <li id="li-vender" style="display:none">
        <a href="vender.html">
          <h3>Meus Produtos</h3>
          <img src="../img/icons/perfil.png" class="header-icone-perfil" alt="Meus Produtos">
        </a>
      </li>

      <li id="li-admin" style="display:none">
        <a href="admin.html" class="btn-admin-header">⚙ Admin</a>
      </li>

      <li>
        <a href="../pages/pedidos.html">
          <h3>Meus pedidos</h3>
          <img src="../img/icons/pedidos.png" class="header-icone-pedidos" alt="Meus Pedidos">
        </a>
      </li>

      <li id="li-carrinho">
        <a href="../pages/carrinho.html">
          <h3>Meu carrinho</h3>
          <img src="../img/icons/carrinho.png" class="header-icone-carrinho" alt="Carrinho de Compras">
          <span class="carrinho-badge" id="carrinho-badge">0</span>
        </a>
      </li>
    </ul>
  </header>

  <div class="risco"></div>

  <!-- MAIN -->
  <main class="perfil-page">

    <!-- Banner -->
    <div class="perfil-banner">
      <div class="perfil-banner__avatar" id="perfil-avatar"></div>
      <div class="perfil-banner__info">
        <h1 id="perfil-hero-nome"></h1>
        <span class="perfil-banner__tipo" id="perfil-hero-tipo"></span>
      </div>
      <a href="../index.html" class="perfil-banner__voltar">← Voltar à loja</a>
    </div>

    <!-- Formulário -->
    <div class="perfil-content">
      <form id="form-perfil" novalidate>

        <!-- Dados Pessoais -->
        <div class="perfil-card">
          <div class="perfil-card__header">
            <div class="perfil-card__icon">👤</div>
            <h2 class="perfil-card__titulo">Dados Pessoais</h2>
          </div>

          <div class="perfil-grid">
            <div class="perfil-campo perfil-campo--full" id="campo-razao-perfil" style="display:none">
              <label>Razão Social</label>
              <input type="text" id="perfil-razao-input" placeholder="Nome da empresa">
            </div>

            <div class="perfil-campo">
              <label>Nome completo</label>
              <input type="text" id="perfil-nome-input" placeholder="Digite seu nome">
            </div>

            <div class="perfil-campo" id="campo-cpf-perfil">
              <label>CPF</label>
              <input type="text" id="perfil-cpf-input" placeholder="000.000.000-00" maxlength="14">
            </div>

            <div class="perfil-campo" id="campo-cnpj-perfil" style="display:none">
              <label>CNPJ</label>
              <input type="text" id="perfil-cnpj-input" placeholder="00.000.000/0001-00" maxlength="18">
            </div>

            <div class="perfil-campo perfil-campo--full">
              <label>E-mail</label>
              <input type="email" id="perfil-email-input" placeholder="Digite seu e-mail">
            </div>
          </div>
        </div>

        <!-- Endereço (Física) -->
        <div class="perfil-card" id="card-endereco" style="display:none">
          <div class="perfil-card__header">
            <div class="perfil-card__icon">📍</div>
            <h2 class="perfil-card__titulo">Endereço de Entrega</h2>
          </div>

          <div class="perfil-grid">
            <div class="perfil-campo perfil-campo--cep">
              <label>CEP</label>
              <input type="text" id="perfil-cep" placeholder="00000-000" maxlength="9" autocomplete="postal-code">
              <p id="perfil-cep-msg" class="cep-msg"></p>
            </div>

            <div class="perfil-campo perfil-campo--rua">
              <label>Rua / Logradouro</label>
              <input type="text" id="perfil-rua" placeholder="Nome da rua">
            </div>

            <div class="perfil-campo perfil-campo--num">
              <label>Número</label>
              <input type="text" id="perfil-numero" placeholder="Nº">
            </div>

            <div class="perfil-campo perfil-campo--full">
              <label>Complemento <span class="perfil-opcional">(opcional)</span></label>
              <input type="text" id="perfil-complemento" placeholder="Apto, bloco, casa...">
            </div>

            <div class="perfil-campo">
              <label>Bairro</label>
              <input type="text" id="perfil-bairro" placeholder="Seu bairro">
            </div>

            <div class="perfil-campo">
              <label>Cidade</label>
              <input type="text" id="perfil-cidade" placeholder="Sua cidade">
            </div>

            <div class="perfil-campo perfil-campo--uf">
              <label>UF</label>
              <input type="text" id="perfil-estado" placeholder="PR" maxlength="2">
            </div>
          </div>
        </div>

        <!-- Alterar Senha -->
        <div class="perfil-card">
          <div class="perfil-card__header">
            <div class="perfil-card__icon">🔒</div>
            <h2 class="perfil-card__titulo">Alterar Senha <span class="perfil-opcional">(opcional)</span></h2>
          </div>

          <div class="perfil-grid">
            <div class="perfil-campo">
              <label>Senha atual</label>
              <input type="password" id="perfil-senha-atual" placeholder="Sua senha atual">
            </div>

            <div class="perfil-campo">
              <label>Nova senha</label>
              <input type="password" id="perfil-senha-nova" placeholder="Mínimo 6 caracteres">
            </div>

            <div class="perfil-campo">
              <label>Confirmar nova senha</label>
              <input type="password" id="perfil-senha-confirmar" placeholder="Repita a nova senha">
            </div>
          </div>
        </div>

        <button type="submit" class="perfil-btn-salvar">Salvar alterações</button>

      </form>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <section class="footer-pagamentos">
      <h2>Comic Geek Store</h2>
      <h3>Sua loja de quadrinhos favorita</h3>
    </section>
    <div class="risco"></div>
    <div class="footer-sociais">
      <ul>
        <li><h3>Siga-nos nas redes sociais:</h3></li>
        <li><img src="../img/icons/twitter.png" class="icone-social" alt="Twitter"></li>
        <li><img src="../img/icons/instagram.png" class="icone-social" alt="Instagram"></li>
        <li><img src="../img/icons/facebook.png" class="icone-social" alt="Facebook"></li>
        <li><img src="../img/icons/whatsapp.png" class="icone-social" alt="WhatsApp"></li>
      </ul>
    </div>
  </footer>

  <script src="../js/main.js"></script>
</body>

</html>
